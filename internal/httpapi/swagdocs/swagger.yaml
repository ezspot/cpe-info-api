basePath: /
definitions:
  cpe.ArpEntry:
    properties:
      host:
        type: string
      iface:
        type: string
      ipv4:
        type: string
      mac:
        type: string
      state:
        type: string
    type: object
  cpe.CollectResponse:
    properties:
      arp:
        items:
          $ref: '#/definitions/cpe.ArpEntry'
        type: array
      cpeInfo:
        additionalProperties:
          type: string
        type: object
      dhcpLeases:
        items:
          $ref: '#/definitions/cpe.DhcpLease'
        type: array
      errors:
        items:
          type: string
        type: array
      ethPorts:
        items:
          $ref: '#/definitions/cpe.EthPort'
        type: array
      interfaces:
        items:
          $ref: '#/definitions/cpe.Iface'
        type: array
      ip:
        type: string
      lanHosts:
        items:
          $ref: '#/definitions/cpe.LanHost'
        type: array
      loadAvg:
        $ref: '#/definitions/cpe.ProcLoadAvg'
      model:
        type: string
      port:
        type: integer
      portMap:
        items:
          $ref: '#/definitions/cpe.PortMapEntry'
        type: array
      raw:
        additionalProperties:
          type: string
        type: object
      sfp:
        $ref: '#/definitions/cpe.SfpInfo'
      sshFailed:
        type: boolean
      timestamp:
        type: string
      uptime:
        $ref: '#/definitions/cpe.UptimeInfo'
      wifi24Assoc:
        items:
          $ref: '#/definitions/cpe.WifiAssoc'
        type: array
      wifi50Assoc:
        items:
          $ref: '#/definitions/cpe.WifiAssoc'
        type: array
      wlanConfig:
        items:
          $ref: '#/definitions/cpe.WlanRow'
        type: array
    type: object
  cpe.DhcpLease:
    properties:
      expirySeconds:
        type: integer
      hostname:
        type: string
      ipv4:
        type: string
      mac:
        type: string
    type: object
  cpe.EthPort:
    properties:
      duplex:
        type: string
      enable:
        type: integer
      interface:
        type: string
      raw:
        type: string
      speed:
        type: integer
      status:
        type: string
    type: object
  cpe.Iface:
    properties:
      broadcast:
        type: string
      hwaddr:
        type: string
      ipv4:
        type: string
      ipv6LinkLocal:
        type: string
      mtu:
        type: integer
      name:
        type: string
      netmask:
        type: string
      rxBytes:
        type: integer
      rxDropped:
        type: integer
      rxErrors:
        type: integer
      rxPackets:
        type: integer
      txBytes:
        type: integer
      txDropped:
        type: integer
      txErrors:
        type: integer
      txPackets:
        type: integer
    type: object
  cpe.LanHost:
    properties:
      addressSource:
        type: string
      connectionType:
        type: string
      ipv4:
        type: string
      ipv6:
        type: string
      mac:
        type: string
      name:
        type: string
    type: object
  cpe.PortMapEntry:
    properties:
      macNoColons:
        type: string
      portCodeHex:
        type: string
    type: object
  cpe.ProcLoadAvg:
    properties:
      lastPid:
        type: integer
      load:
        items:
          type: number
        type: array
      procs:
        type: string
      raw:
        type: string
    type: object
  cpe.SfpInfo:
    properties:
      duplex:
        type: string
      linkState:
        type: string
      partNumber:
        type: string
      present:
        type: boolean
      raw:
        type: string
      rxPowerDbm:
        type: number
      serialNumber:
        type: string
      speedMbit:
        type: integer
      temperatureC:
        type: number
      txPowerDbm:
        type: number
      vendorName:
        type: string
    type: object
  cpe.UptimeInfo:
    properties:
      clockTime:
        type: string
      loadAvg:
        items:
          type: number
        type: array
      raw:
        type: string
      upText:
        type: string
    type: object
  cpe.WifiAssoc:
    properties:
      address:
        type: string
      level:
        type: integer
      rateKbps:
        type: integer
      rssi:
        type: integer
      snr:
        type: integer
    type: object
  cpe.WlanRow:
    properties:
      band:
        type: string
      bandwidth:
        type: string
      channel:
        type: string
      enable:
        type: integer
      index:
        type: integer
      maxDevices:
        type: integer
      pmf:
        type: string
      pskValue:
        type: string
      raw:
        type: string
      securityMode:
        type: string
      ssid:
        type: string
    type: object
  httpapi.CollectRequestBody:
    properties:
      ip:
        type: string
      model:
        type: string
      port:
        type: integer
    type: object
  httpapi.apiError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  httpapi.apiErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/httpapi.apiError'
    type: object
info:
  contact: {}
  description: Collect CPE diagnostics over SSH with model-aware authentication.
  title: CPE Info API
  version: "1.0"
paths:
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - Health
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - Health
  /v1/cpe/collect:
    get:
      consumes:
      - application/json
      description: Supports GET query params and POST JSON body.
      parameters:
      - description: Target CPE IP (GET)
        in: query
        name: ip
        type: string
      - description: Target SSH port (GET, default 22)
        in: query
        name: port
        type: integer
      - description: Model (VANTIVA/FMG/P2812/VMG/AX/EX)
        in: query
        name: model
        type: string
      - description: Include raw command output
        in: query
        name: raw
        type: boolean
      - description: Include cleartext PSK values
        in: query
        name: includePsk
        type: boolean
      - description: Target CPE data (POST)
        in: body
        name: payload
        schema:
          $ref: '#/definitions/httpapi.CollectRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cpe.CollectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cpe.CollectResponse'
      security:
      - BearerAuth: []
      summary: Collect CPE diagnostics
      tags:
      - CPE
    post:
      consumes:
      - application/json
      description: Supports GET query params and POST JSON body.
      parameters:
      - description: Target CPE IP (GET)
        in: query
        name: ip
        type: string
      - description: Target SSH port (GET, default 22)
        in: query
        name: port
        type: integer
      - description: Model (VANTIVA/FMG/P2812/VMG/AX/EX)
        in: query
        name: model
        type: string
      - description: Include raw command output
        in: query
        name: raw
        type: boolean
      - description: Include cleartext PSK values
        in: query
        name: includePsk
        type: boolean
      - description: Target CPE data (POST)
        in: body
        name: payload
        schema:
          $ref: '#/definitions/httpapi.CollectRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cpe.CollectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpapi.apiErrorEnvelope'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/cpe.CollectResponse'
      security:
      - BearerAuth: []
      summary: Collect CPE diagnostics
      tags:
      - CPE
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Use `Bearer <token>`.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
